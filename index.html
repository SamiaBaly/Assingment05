<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub issu Tracker</title>

  <!-- css -->
  <link rel="stylesheet" href="styles/style.css">

  <!-- google font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

  <!-- font awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- tailwind and daisyUI -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="min-h-screen bg-base-200 py-30 ">
  <section class="max-w-md bg-base-100 shadow-sm mx-auto  p-8 rounded-md">
    <div class="">
      <img class="mx-auto" src="assets/github-logo.png" alt="">
      <h1 class="text-2xl font-semibold text-center mt-6 text-[#1F2937]">GitHub Issues Tracker</h1>
      <p class="text-[16px] text-[#64748B] text-center">Sign in to manage your issues</p>
    </div>
    <div class="mt-4">
      <fieldset class="fieldset">
        <label class="label text-[16px] text-[#1F2937] font-medium">Username</label>
        <input id="user-name" type="text" class="input w-full" placeholder="Enter Username" />
        <div>
          <p class="text-primary text-[14px]">Default: admin</p>
        </div>
        <label class="label text-[16px] text-[#1F2937] font-medium">Password</label>
        <input id="password" type="password" class="input w-full" placeholder="Enter Password" />
        <div><p class="text-primary text-[14px]">Default: admin123</p></div>
        <button id="login-btn" class="btn btn-primary mt-4">Sign In</button>
      </fieldset>
    </div>
    <div class="divider">OR</div>
    <div class="text-center mb-3">
      <p class="text-[#64748B]">Demo Credentials:</p>
    </div>
    <div class="bg-base-200 mx-auto text-center py-6 rounded-md">
      <p class="font-semibold text-[16px]">Username: <span class="font-normal">admin</span></p>
      <p class="font-semibold text-[16px]">Password: <span class="font-normal">admin123</span> </p>
    </div>

  </section>



  <script src="scripts/login.js"></script>
</body>

</html>
