<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub issu Tracker</title>

  <!-- css -->
  <link rel="stylesheet" href="styles/style.css">

  <!-- google font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

  <!-- font awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- tailwind and daisyUI -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
  <!-- header section -->
  <header class="">
    
    <div class="grid grid-cols-1 md:grid-cols-2 justify-between items-center navbar bg-base-100 shadow-sm px-10">
      <div class="flex flex-1 items-center gap-3 justify-start my-5 ">
        <img class="w-[36px]" src="./assets/github-logo.png" alt="">
        <p class="text-2xl font-semibold text-[#1F2937]">GitHub Issues Tracker</p>
      </div>
      <div class="flex gap-2 justify-end">
        <div class="relative w-64">
          <input id="sarch-input" type="text" placeholder="Search" class="input input-bordered w-full pl-10" />
          <span class="absolute left-2 top-1/2 -translate-y-1/2 text-gray-400">
            <i class="fa-solid fa-magnifying-glass"></i>
          </span>
        </div>
        <button id="new-issu" class="btn btn-primary"> + New Issue</button>
      </div>
    </div>
  </header>



  <main class="w-11/12 mx-auto p-5 bg-base-200">

    <!-- top button section -->

    

    <!-- count issues section -->

    <section class="bg-base-100 shadow-sm p-5 mt-9">
      <div class="grid grid-cols-1 md:grid-cols-2 justify-between items-center border-b-neutral-500">
        <div class="flex gap-2 items-center">
          <div class="w-12 h-12 bg-purple-200 rounded-full"><img src="./assets/Aperture.png" alt=""
              class=" mx-auto my-2"></div>
          <div>
            <h2 class="text-xl font-semibold"><span id="count">0</span> Issues</h2>
            <p class="text-[16px] text-[#64748B]">Track and manage your project issues</p>
          </div>
        </div>
        <div class=" flex justify-end gap-3">
          <!-- open -->
          <div class="flex items-center gap-2">
            <span class="h-3 w-3 bg-green-700 rounded-full"></span>
            <p>Open</p>
          </div>
          <!-- closed -->
          <div class="flex items-center gap-2">
            <span class="h-3 w-3 bg-[#A855F7] rounded-full"></span>
            <p>Closed</p>
          </div>
        </div>

      </div>
    </section>

    <!-- card section -->
    <section class="bg-base-200 shadow-sm pt-5">
      <div id="all-cards" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
        <!-- daynamic card -->


      </div>
      <div id="loadingSpinner" class="h-[60vh] hidden flex justify-center items-center">
        <span class="loading loading-dots loading-xl"></span>
      </div>

    </section>

    <!-- Open the modal using ID.showModal() method -->
    <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
    <dialog id="card_modal" class="modal modal-bottom sm:modal-middle">
      <div class="modal-box">
        <div id="details-box">



        </div>
        <div class="modal-action">
          <form method="dialog">
            <!-- if there is a button in form, it will close the modal -->
            <button class="btn bg-primary text-white">Close</button>
          </form>
        </div>
      </div>
    </dialog>
  </main>



  <section>
    <div class="box">

    </div>
  </section>




  <script src="scripts/script.js"></script>
</body>

</html>
